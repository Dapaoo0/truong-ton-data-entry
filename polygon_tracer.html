<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm 157 - Polygon Tracer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Segoe UI', Tahoma, sans-serif; 
    background: #1a1a2e; 
    color: #e0e0e0; 
    display: flex; 
    height: 100vh; 
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 320px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar h2 {
    padding: 16px;
    background: #0f3460;
    font-size: 16px;
    text-align: center;
    color: #e94560;
  }
  .controls {
    padding: 12px;
    border-bottom: 1px solid #0f3460;
  }
  .controls label {
    font-size: 13px;
    color: #aaa;
    display: block;
    margin-bottom: 4px;
  }
  .controls input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #0f3460;
    border-radius: 6px;
    background: #1a1a2e;
    color: #fff;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .btn-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .btn {
    flex: 1;
    padding: 8px 6px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { filter: brightness(1.15); }
  .btn-start { background: #00b894; color: #fff; }
  .btn-finish { background: #0984e3; color: #fff; }
  .btn-undo { background: #636e72; color: #fff; }
  .btn-delete { background: #d63031; color: #fff; }
  .btn-export { background: #e94560; color: #fff; width: 100%; padding: 10px; font-size: 14px; }
  .btn-import { background: #6c5ce7; color: #fff; width: 100%; padding: 10px; font-size: 14px; }

  /* Lot list */
  .lot-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .lot-item {
    padding: 8px 10px;
    margin-bottom: 4px;
    border-radius: 6px;
    background: #1a1a2e;
    border: 1px solid #0f3460;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    transition: all 0.15s;
  }
  .lot-item:hover { border-color: #e94560; }
  .lot-item.active { border-color: #00b894; background: #0f3460; }
  .lot-item .lot-name { font-weight: 600; }
  .lot-item .lot-pts { color: #aaa; font-size: 12px; }
  .lot-item .lot-color {
    width: 14px; height: 14px;
    border-radius: 3px;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .lot-left { display: flex; align-items: center; }

  /* Status bar */
  .status {
    padding: 10px 12px;
    background: #0f3460;
    font-size: 12px;
    color: #aaa;
    border-top: 1px solid #0f3460;
  }
  .status span { color: #00b894; font-weight: 600; }

  /* Canvas area */
  .canvas-area {
    flex: 1;
    position: relative;
    overflow: auto;
    background: #111;
  }
  .canvas-area canvas {
    cursor: crosshair;
    display: block;
  }

  /* Tooltip */
  .coord-tooltip {
    position: fixed;
    background: rgba(15,52,96,0.95);
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    pointer-events: none;
    z-index: 999;
    display: none;
  }

  /* Instructions */
  .instructions {
    padding: 10px 12px;
    font-size: 12px;
    color: #888;
    line-height: 1.5;
    border-bottom: 1px solid #0f3460;
  }
  .instructions b { color: #e94560; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>🗺️ Farm 157 Polygon Tracer</h2>
  
  <div class="instructions">
    <b>Hướng dẫn:</b><br>
    1. Nhập tên lô → nhấn <b>"Bắt đầu vẽ"</b><br>
    2. <b>Click trái</b> lên ảnh để đặt điểm<br>
    3. Nhấn <b>"Hoàn tất"</b> khi xong 1 lô<br>
    4. Lặp lại cho các lô khác<br>
    5. Nhấn <b>"Xuất JSON"</b> để lấy tọa độ
  </div>

  <div class="controls">
    <label>Tên lô (VD: 7A, 11B...)</label>
    <input type="text" id="lotName" placeholder="Nhập tên lô..." />
    <div class="btn-row">
      <button class="btn btn-start" onclick="startDrawing()">Bắt đầu vẽ</button>
      <button class="btn btn-finish" onclick="finishPolygon()">Hoàn tất</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-undo" onclick="undoPoint()">↩ Undo điểm</button>
      <button class="btn btn-delete" onclick="deleteSelected()">🗑 Xóa lô</button>
    </div>
    <button class="btn btn-export" onclick="exportJSON()">Xuất JSON</button>
    <div style="height: 6px;"></div>
    <button class="btn btn-import" onclick="importJSON()">Nhập JSON</button>
  </div>

  <div class="lot-list" id="lotList"></div>

  <div class="status">
    Tổng: <span id="totalLots">0</span> lô | 
    Đang vẽ: <span id="currentStatus">—</span>
  </div>
</div>

<div class="canvas-area" id="canvasArea">
  <canvas id="mapCanvas"></canvas>
</div>

<div class="coord-tooltip" id="tooltip"></div>

<script>
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const canvasArea = document.getElementById('canvasArea');

let image = new Image();
let lots = []; // { name, points: [{x,y}], color }
let currentPoints = [];
let isDrawing = false;
let currentLotName = '';
let selectedLotIndex = -1;
let imgScale = 1;

// Color palette for lots
const colors = [
  '#e94560','#00b894','#0984e3','#fdcb6e','#6c5ce7',
  '#00cec9','#ff7675','#a29bfe','#55efc4','#fab1a0',
  '#74b9ff','#ffeaa7','#dfe6e9','#fd79a8','#81ecec',
  '#e17055','#b2bec3','#636e72','#2d3436','#d63031',
  '#e84393','#f39c12','#27ae60','#2980b9','#8e44ad'
];

// Load farm map image — try multiple extensions
const imageNames = [
  'farm_157_map.png', 'farm_157_map.jpg', 'farm_157_map.jpeg',
  'farm157.png', 'farm157.jpg', 'map.png', 'map.jpg'
];
let imageAttempt = 0;

image.onload = function() {
  canvas.width = image.width;
  canvas.height = image.height;
  redraw();
};

function tryNextImage() {
  if (imageAttempt < imageNames.length) {
    image.src = imageNames[imageAttempt++];
  } else {
    alert('Không tìm thấy ảnh bản đồ!\n\nHãy đặt ảnh cùng thư mục với file này, tên:\n• farm_157_map.png hoặc .jpg\n\nHoặc kéo thả ảnh vào cửa sổ.');
  }
}

image.onerror = tryNextImage;
tryNextImage();

// Drag and drop image support
canvasArea.addEventListener('dragover', e => { e.preventDefault(); });
canvasArea.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => {
      image.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
});

// Canvas click — add point
canvas.addEventListener('click', function(e) {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = Math.round((e.clientX - rect.left) * scaleX);
  const y = Math.round((e.clientY - rect.top) * scaleY);
  currentPoints.push({ x, y });
  redraw();
});

// Mouse move — tooltip
canvas.addEventListener('mousemove', function(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = Math.round((e.clientX - rect.left) * scaleX);
  const y = Math.round((e.clientY - rect.top) * scaleY);
  
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY + 12) + 'px';
  tooltip.textContent = `x: ${x}, y: ${y}`;

  // Highlight lot on hover
  if (!isDrawing) {
    let found = -1;
    for (let i = lots.length - 1; i >= 0; i--) {
      if (isPointInPolygon(x, y, lots[i].points)) {
        found = i;
        break;
      }
    }
    canvas.style.cursor = found >= 0 ? 'pointer' : 'default';
  }
});

canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

// Right-click to undo last point
canvas.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  if (isDrawing && currentPoints.length > 0) {
    currentPoints.pop();
    redraw();
  }
});

function startDrawing() {
  const name = document.getElementById('lotName').value.trim();
  if (!name) { alert('Vui lòng nhập tên lô!'); return; }
  if (lots.some(l => l.name === name)) { alert(`Lô "${name}" đã tồn tại!`); return; }
  
  isDrawing = true;
  currentLotName = name;
  currentPoints = [];
  selectedLotIndex = -1;
  canvas.style.cursor = 'crosshair';
  document.getElementById('currentStatus').textContent = name;
  redraw();
}

function finishPolygon() {
  if (!isDrawing) return;
  if (currentPoints.length < 3) {
    alert('Cần ít nhất 3 điểm để tạo polygon!');
    return;
  }
  
  const color = colors[lots.length % colors.length];
  lots.push({
    name: currentLotName,
    points: [...currentPoints],
    color: color
  });
  
  isDrawing = false;
  currentPoints = [];
  currentLotName = '';
  canvas.style.cursor = 'default';
  document.getElementById('lotName').value = '';
  document.getElementById('currentStatus').textContent = '—';
  updateLotList();
  redraw();
}

function undoPoint() {
  if (isDrawing && currentPoints.length > 0) {
    currentPoints.pop();
    redraw();
  }
}

function deleteSelected() {
  if (selectedLotIndex >= 0) {
    lots.splice(selectedLotIndex, 1);
    selectedLotIndex = -1;
    updateLotList();
    redraw();
  } else {
    alert('Hãy chọn một lô trong danh sách trước!');
  }
}

function selectLot(index) {
  selectedLotIndex = index;
  updateLotList();
  redraw();
}

function updateLotList() {
  const list = document.getElementById('lotList');
  document.getElementById('totalLots').textContent = lots.length;
  
  list.innerHTML = lots.map((lot, i) => `
    <div class="lot-item ${i === selectedLotIndex ? 'active' : ''}" onclick="selectLot(${i})">
      <div class="lot-left">
        <div class="lot-color" style="background:${lot.color}"></div>
        <span class="lot-name">${lot.name}</span>
      </div>
      <span class="lot-pts">${lot.points.length} điểm</span>
    </div>
  `).join('');
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw background image
  if (image.complete && image.naturalWidth > 0) {
    ctx.drawImage(image, 0, 0);
  }

  // Draw completed polygons
  lots.forEach((lot, i) => {
    drawPolygon(lot.points, lot.color, i === selectedLotIndex, lot.name);
  });

  // Draw current polygon being traced
  if (isDrawing && currentPoints.length > 0) {
    // Draw lines
    ctx.beginPath();
    ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
    for (let j = 1; j < currentPoints.length; j++) {
      ctx.lineTo(currentPoints[j].x, currentPoints[j].y);
    }
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw vertices
    currentPoints.forEach((p, idx) => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = idx === 0 ? '#00b894' : '#fff';
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }
}

function drawPolygon(points, color, isSelected, name) {
  if (points.length < 3) return;

  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }
  ctx.closePath();

  // Fill with transparency
  ctx.fillStyle = hexToRGBA(color, isSelected ? 0.35 : 0.2);
  ctx.fill();

  // Stroke
  ctx.strokeStyle = color;
  ctx.lineWidth = isSelected ? 3 : 2;
  ctx.stroke();

  // Label
  const cx = points.reduce((s, p) => s + p.x, 0) / points.length;
  const cy = points.reduce((s, p) => s + p.y, 0) / points.length;
  
  ctx.font = 'bold 16px Segoe UI';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  // Text shadow
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillText(name, cx + 1, cy + 1);
  ctx.fillStyle = '#fff';
  ctx.fillText(name, cx, cy);
}

function hexToRGBA(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function isPointInPolygon(x, y, points) {
  let inside = false;
  for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
    const xi = points[i].x, yi = points[i].y;
    const xj = points[j].x, yj = points[j].y;
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

function exportJSON() {
  if (lots.length === 0) {
    alert('Chưa có lô nào để xuất!');
    return;
  }
  
  const data = {
    image_width: canvas.width,
    image_height: canvas.height,
    lots: lots.map(l => ({
      name: l.name,
      points: l.points,
      color: l.color
    }))
  };
  
  const json = JSON.stringify(data, null, 2);
  
  // Copy to clipboard
  navigator.clipboard.writeText(json).then(() => {
    alert(`Đã copy JSON (${lots.length} lô) vào clipboard!\n\nBạn cũng có thể tải file bên dưới.`);
  }).catch(() => {});
  
  // Also download as file
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'farm_157_polygons.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.lots && Array.isArray(data.lots)) {
          lots = data.lots.map((l, i) => ({
            name: l.name,
            points: l.points,
            color: l.color || colors[i % colors.length]
          }));
          selectedLotIndex = -1;
          updateLotList();
          redraw();
          alert(`Đã nhập ${lots.length} lô thành công!`);
        }
      } catch(err) {
        alert('File JSON không hợp lệ!');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (isDrawing) {
      isDrawing = false;
      currentPoints = [];
      currentLotName = '';
      canvas.style.cursor = 'default';
      document.getElementById('currentStatus').textContent = '—';
      redraw();
    }
  }
  if (e.key === 'z' && e.ctrlKey) {
    undoPoint();
  }
  if (e.key === 'Enter' && isDrawing) {
    finishPolygon();
  }
});
</script>

</body>
</html>
