<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }
    #map-frame {
      display: block;
      width: 100%;
      border: 0;
      background: transparent;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <iframe id="map-frame" title="Farm map" scrolling="no"></iframe>
  <script>
    (function () {
      const frame = document.getElementById("map-frame");
      let readySent = false;
      let lastHtml = null;
      let currentArgs = {};

      function postToStreamlit(message) {
        window.parent.postMessage(Object.assign({
          isStreamlitMessage: true
        }, message), "*");
      }

      function componentReady() {
        if (readySent) return;
        readySent = true;
        postToStreamlit({
          type: "streamlit:componentReady",
          apiVersion: 1
        });
      }

      function setFrameHeight(height) {
        const h = Math.max(50, Math.ceil(Number(height) || 600));
        frame.style.height = h + "px";
        frame.height = String(h);
        postToStreamlit({
          type: "streamlit:setFrameHeight",
          height: h
        });
      }

      function estimatedResponsiveHeight(args) {
        const imgW = Number(args && args.img_w) || 0;
        const imgH = Number(args && args.img_h) || 0;
        const aspect = imgW > 0 && imgH > 0 ? imgH / imgW : 0.5625;
        const width =
          frame.getBoundingClientRect().width ||
          document.documentElement.clientWidth ||
          window.innerWidth ||
          1000;

        let legendHeight = 62;
        if (width < 481) legendHeight = 96;
        else if (width < 769) legendHeight = 82;
        else if (width < 1025) legendHeight = 72;

        return Math.ceil(width * aspect + legendHeight + 8);
      }

      function setResponsiveFrameHeight(args) {
        setFrameHeight(estimatedResponsiveHeight(args || currentArgs || {}));
      }

      function setComponentValue(value) {
        postToStreamlit({
          type: "streamlit:setComponentValue",
          value: value
        });
      }

      window.addEventListener("message", function (event) {
        const data = event.data || {};

        if (data.type === "streamlit:render") {
          componentReady();
          const args = data.args || {};
          currentArgs = args;
          const html = args.html || "";
          if (html !== lastHtml) {
            lastHtml = html;
            frame.srcdoc = html;
          }
          setResponsiveFrameHeight(args);
          return;
        }

        if (data.type === "farm-map:costClick") {
          const payload = data.payload || {};
          if (!payload.farm || !payload.lot) return;
          setComponentValue({
            type: "costClick",
            farm: payload.farm,
            lot: payload.lot,
            eventId: String(Date.now()) + "-" + Math.random().toString(16).slice(2)
          });
          return;
        }

        if (data.isStreamlitMessage && data.type === "streamlit:setFrameHeight") {
          setFrameHeight(data.height);
        }
      });

      componentReady();
      window.addEventListener("resize", function () {
        setResponsiveFrameHeight(currentArgs);
      });
      frame.addEventListener("load", function () {
        setTimeout(function () { setResponsiveFrameHeight(currentArgs); }, 50);
        setTimeout(function () { setResponsiveFrameHeight(currentArgs); }, 250);
      });
      setResponsiveFrameHeight(currentArgs);
    })();
  </script>
</body>
</html>
